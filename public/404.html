<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Redirecting... - Solo Developing</title>
    <script>
        // Enhanced redirect script for static hosting
        // This handles any 404 errors by redirecting to the correct page
        const path = window.location.pathname.toLowerCase().replace(/\/$/, ''); // Remove trailing slash
        
        // Keep the language context for unknown routes
        if (path === '/fr' || path.startsWith('/fr/')) {
            window.location.replace('/fr/');
        } else {
            window.location.replace('/');
        }
    </script>
</head>
<body>
    <div style="text-align: center; padding: 50px; font-family: Arial, sans-serif;">
        <h1>Redirecting...</h1>
        <p>Please wait while we redirect you to the correct page.</p>
    </div>
</body>
</html>
