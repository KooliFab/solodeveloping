    <style>
      * {
        box-sizing: border-box;
      }
      body {
        margin: 0;
        padding: 0;
        background: #050505;
        color: #ffffff;
      }
      #root {
        min-height: 100vh;
      }
    </style>

    <script>
      (function () {
        const measurementId = '%VITE_GA_MEASUREMENT_ID%';
        if (!measurementId || measurementId.startsWith('%')) return;

        const initAnalytics = () => {
          if (window.__sdAnalyticsInitialized) return;
          window.__sdAnalyticsInitialized = true;

          window.dataLayer = window.dataLayer || [];
          window.gtag = function gtag() {
            window.dataLayer.push(arguments);
          };
          window.gtag('js', new Date());
          window.gtag('config', measurementId, { transport_type: 'beacon' });

          const script = document.createElement('script');
          script.async = true;
          script.src = `https://www.googletagmanager.com/gtag/js?id=${measurementId}`;
          document.head.appendChild(script);
        };

        if ('requestIdleCallback' in window) {
          requestIdleCallback(initAnalytics, { timeout: 3000 });
        } else {
          window.addEventListener('load', () => setTimeout(initAnalytics, 1200), { once: true });
        }
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
